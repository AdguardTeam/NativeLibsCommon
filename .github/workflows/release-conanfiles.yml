name: Release conanfiles

on:
  workflow_dispatch:

jobs:
  release-conanfiles:
    name: Release conanfiles.tar.gz
    if: github.repository == 'AdguardTeam/NativeLibsCommon'
    runs-on: [team-corelibs]
    environment: conanfiles-github
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build conanfiles archive
        id: build
        run: |
          set -e -x

          mkdir conanfiles_build
          cd conanfiles_build

          ARCHIVE_NAME=conanfiles.tar.gz

          cp -r ../conan/profiles .
          cp -r ../conan/settings_user.yml .
          cp -r ../cmake/conan_provider.cmake .
          tar czf ${ARCHIVE_NAME} *

          VERSION=$(grep "[0-9]*\.[0-9]*\." ../conandata.yml | tail -1 | sed 's/\s*"//' | sed 's/":\s*//')
          TAG="v${VERSION}"

          echo "archive=${PWD}/${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e -x

          TAG="${{ steps.build.outputs.tag }}"

          git tag -d "${TAG}" 2>/dev/null || true
          git tag "${TAG}"
          git push origin "${TAG}" --force

          gh release create "${TAG}" "${{ steps.build.outputs.archive }}" \
            --title "Conan files ${TAG}" \
            --notes "Make various Conan-related files available for use in other AdGuard projects."

      - name: Cleanup
        if: always()
        run: rm -rf conanfiles_build
