name: Run tests

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:

jobs:
  win-build:
    name: Win build
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    runs-on:
      - ephemeral
      - ephemeral-vmwin
      - registry.int.agrd.dev/windows/windows2022-github:20260528-1801
      - ephemeral-limit-memory-6144
      - ephemeral-limit-cpu-8
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: |
          $ErrorActionPreference = 'Continue'

          & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

          # Save vcvars to switch between them
          $vcvars32 = cmd /c "vcvarsamd64_x86 & set"
          $vcvars64 = cmd /c "vcvars64 & set"
          $vcvarsarm64 = cmd /c "vcvarsamd64_arm64 & set"
          $vcvarsarm = cmd /c "vcvarsamd64_arm & set"
          function setvar($_) {
            if ($_ -match "=") {
              $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
            }
          }

          # Build 32-bit and 64-bit versions
          & {
            $vcvars32 | foreach { setvar $_ }
            dir "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\"
            dir "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\MSBuild\Current\Bin\"
          }          
        shell: powershell
