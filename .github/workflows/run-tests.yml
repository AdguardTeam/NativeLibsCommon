name: Run tests

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  # Image used for the containerized Linux and Android builds on `team-corelibs`.
  CORELIBS_IMAGE: adguard/core-libs:2.12

jobs:
  resolve-images:
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    uses: ./.github/workflows/resolve-images.yml

  tests:
    name: ${{ matrix.name }} build
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    needs: resolve-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Win
            runs-on: '["ephemeral","ephemeral-vmwin","${{ needs.resolve-images.outputs.windows }}","ephemeral-limit-memory-4096","ephemeral-limit-cpu-4"]'
            container-image: ''
            shell: powershell
            artifact-name: test-results-windows
            results-path: 'cmake-build-msvc-debug/junit.xml'
            test-command: |
              $ErrorActionPreference = 'Stop'

              # Windows runners ship no make of their own.
              & choco install make -y --no-progress
              if (!$?) { exit 1 }

              & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

              # Tests are built for 32-bit x86, so use the cross toolchain env.
              cmd /c "vcvarsamd64_x86 & set" | ForEach-Object {
                if ($_ -match "=") {
                  $v = $_.split("=", 2)
                  Set-Item -Force -Path "ENV:\$($v[0])" -Value $v[1]
                }
              }

              & make PRESET=msvc-debug test
              if (!$?) { exit 1 }
            finally-script: |
              $ErrorActionPreference = 'Continue'

              & conan remote login art "$env:ARTIFACTORY_USER" --password "$env:ARTIFACTORY_API_KEY"
              & conan upload -r art -c "*" 2>&1 | Select-String "Uploading" -SimpleMatch
          - name: Mac
            runs-on: '["ephemeral","ephemeral-mac","${{ needs.resolve-images.outputs.macos }}","ephemeral-limit-memory-6144","ephemeral-limit-cpu-4"]'
            container-image: ''
            shell: bash
            artifact-name: test-results-macos
            results-path: 'cmake-build-clang-debug/junit.xml'
            test-command: |
              set -eux

              rm -rf venv
              python3 -m venv venv
              source ./venv/bin/activate

              python3 -m pip install conan
              conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

              # CMAKE_OSX_ARCHITECTURES defaults to the host arch (override: ARCH=...).
              make PRESET=clang-debug test
            finally-script: |
              set -eux

              source ./venv/bin/activate
              conan remote login art "$ARTIFACTORY_USER" --password "$ARTIFACTORY_API_KEY"
              conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"
    uses: AdGuardSoftwareLimited/actions/.github/workflows/junit-tests.yml@master
    secrets:
      test-env: |
        ARTIFACTORY_USER=${{ secrets.ARTIFACTORY_USER }}
        ARTIFACTORY_API_KEY=${{ secrets.ARTIFACTORY_API_KEY }}
    with:
      runs-on: ${{ matrix.runs-on }}
      container-image: ${{ matrix.container-image }}
      shell: ${{ matrix.shell || 'bash' }}
      test-command: ${{ matrix.test-command }}
      finally-script: ${{ matrix.finally-script }}
      results-path: ${{ matrix.results-path }}
      artifact-name: ${{ matrix.artifact-name }}

  linux-tests:
    name: Linux build
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    runs-on: team-corelibs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        uses: AdGuardSoftwareLimited/actions/actions/docker-build@master
        with:
          target: results
          output: type=local,dest=build
          build-args: |
            CACHEBUST=${{ github.run_id }}-${{ github.run_attempt }}
          secrets: |
            CONAN_REPO_URL=${{ vars.CONAN_REPO_URL }}
            ARTIFACTORY_USER=${{ secrets.ARTIFACTORY_USER }}
            ARTIFACTORY_API_KEY=${{ secrets.ARTIFACTORY_API_KEY }}
          content: |
            # syntax=docker/dockerfile:1
            FROM ${{ env.CORELIBS_IMAGE }} AS tests

            WORKDIR /src
            COPY . .

            # Changes on every run so the tests are never served from the cache.
            ARG CACHEBUST

            RUN --mount=type=secret,id=CONAN_REPO_URL,required=true \
                --mount=type=secret,id=ARTIFACTORY_USER \
                --mount=type=secret,id=ARTIFACTORY_API_KEY <<'END'
            set -eux

            python3 -m pip install conan --upgrade
            conan remote add --index 0 art "$(cat /run/secrets/CONAN_REPO_URL)" || true

            make PRESET=clang-debug-sanitizer test || test_status=$?

            # Upload whatever was built, then report the test result.
            conan remote login art "$(cat /run/secrets/ARTIFACTORY_USER)" \
                --password "$(cat /run/secrets/ARTIFACTORY_API_KEY)"
            conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading" || true

            # Drop the build outputs before the layer is committed; junit.xml,
            # which the next stage copies out, is not a build artifact.
            make PRESET=clang-debug-sanitizer clean || true
            exit ${test_status:-0}
            END

            FROM scratch AS results

            COPY --from=tests /src/cmake-build-clang-debug-sanitizer/junit.xml /junit.xml

      - name: JUnit summary
        if: always()
        uses: AdGuardSoftwareLimited/actions/actions/junit-summary@master
        with:
          path: 'build/junit.xml'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-linux
          path: 'build/junit.xml'
          # The report is only exported when the build succeeds, so a failing
          # test run leaves nothing to upload.
          if-no-files-found: warn

  android-build:
    name: Android build
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    runs-on: team-corelibs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Android library
        uses: AdGuardSoftwareLimited/actions/actions/docker-build@master
        with:
          target: android-build
          output: type=cacheonly
          build-args: |
            CACHEBUST=${{ github.run_id }}-${{ github.run_attempt }}
          secrets: |
            CONAN_REPO_URL=${{ vars.CONAN_REPO_URL }}
            ARTIFACTORY_USER=${{ secrets.ARTIFACTORY_USER }}
            ARTIFACTORY_API_KEY=${{ secrets.ARTIFACTORY_API_KEY }}
          content: |
            # syntax=docker/dockerfile:1
            FROM ${{ env.CORELIBS_IMAGE }} AS android-build

            WORKDIR /src

            # Only what Gradle needs to configure the project: the C++ sources
            # are copied further down, so editing them leaves this layer — and
            # the Gradle distribution and dependencies it pulls — cached.
            COPY android ./android
            COPY CMakeLists.txt ./

            RUN --mount=type=secret,id=CONAN_REPO_URL,required=true <<'END'
            set -eux

            python3 -m pip install conan --upgrade
            conan remote add --index 0 art "$(cat /run/secrets/CONAN_REPO_URL)" || true

            cd android/NativeLibsCommon
            touch local.properties
            echo "cmake.dir=$(dirname "$(dirname "$(which cmake)")")" >> local.properties
            ./gradlew --no-daemon :lib:preBuild
            END

            COPY . .

            # Changes on every run, so the build below is never cached.
            ARG CACHEBUST

            RUN --mount=type=secret,id=ARTIFACTORY_USER \
                --mount=type=secret,id=ARTIFACTORY_API_KEY <<'END'
            set -eux

            cd android/NativeLibsCommon
            ./gradlew --no-daemon :lib:assembleRelease || build_status=$?

            conan remote login art "$(cat /run/secrets/ARTIFACTORY_USER)" \
                --password "$(cat /run/secrets/ARTIFACTORY_API_KEY)"
            conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading" || true

            # Keep the build outputs out of the committed layer.
            ./gradlew --no-daemon clean || true
            exit ${build_status:-0}
            END
