name: Run tests

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  resolve-images:
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    uses: ./.github/workflows/resolve-images.yml

  tests:
    name: ${{ matrix.name }} build
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    needs: resolve-images
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Win
            runs-on: '["ephemeral","ephemeral-vmwin","${{ needs.resolve-images.outputs.windows }}","ephemeral-limit-memory-4096","ephemeral-limit-cpu-4"]'
            container-image: ''
            shell: powershell
            artifact-name: test-results-windows
            test-command: |
              $ErrorActionPreference = 'Stop'

              & conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }}

              # Save vcvars to switch between them
              $vcvars32 = cmd /c "vcvarsamd64_x86 & set"
              $vcvars64 = cmd /c "vcvars64 & set"
              $vcvarsarm64 = cmd /c "vcvarsamd64_arm64 & set"
              $vcvarsarm = cmd /c "vcvarsamd64_arm & set"
              function setvar($_) {
                if ($_ -match "=") {
                  $v = $_.split("="); set-item -force -path "ENV:\$($v[0])"  -value "$($v[1])"
                }
              }

              & {
                $vcvars32 | foreach { setvar $_ }
                mkdir build
                pushd build
                & cmake -DCMAKE_BUILD_TYPE=Debug `
                  -DCMAKE_C_COMPILER="cl.exe" `
                  -DCMAKE_CXX_COMPILER="cl.exe" `
                  -DCMAKE_C_FLAGS_DEBUG=/MT `
                  -DCMAKE_CXX_FLAGS_DEBUG=/MT `
                  -G Ninja ..
                if (!$?) { exit 1 }
                & ninja tests
                if (!$?) { exit 1 }
                & ctest --output-junit junit.xml -D ExperimentalTest --no-compress-output
                if (!$?) { exit 1 }
                popd
              }
            finally-script: |
              $ErrorActionPreference = 'Continue'

              & conan remote login art "$env:ARTIFACTORY_USER" --password "$env:ARTIFACTORY_API_KEY"
              & conan upload -r art -c "*" 2>&1 | Select-String "Uploading" -SimpleMatch
          - name: Linux
            runs-on: '["team-corelibs"]'
            container-image: ''
            shell: bash
            artifact-name: test-results-linux
            test-command: |
              set -euxo pipefail

              rm -rf build
              export CONAN_REPO_URL='${{ vars.CONAN_REPO_URL }}'
              build_log=$(mktemp)
              run_build() {
                DOCKER_BUILDKIT=1 docker build --progress=plain \
                  --build-arg CI_CACHE_BUSTER='${{ github.run_id }}-${{ github.run_attempt }}' \
                  --secret id=conan_repo_url,env=CONAN_REPO_URL \
                  --secret id=artifactory_user,env=ARTIFACTORY_USER \
                  --secret id=artifactory_api_key,env=ARTIFACTORY_API_KEY \
                  --target native-tests-output \
                  --output type=local,dest=build \
                  -f Dockerfile.build . 2>&1 | tee "$build_log"
              }

              if ! run_build; then
                if ! grep -Eq 'graceful_stop|failed to receive status' "$build_log"; then
                  exit 1
                fi
                echo 'BuildKit stopped gracefully; retrying the build once.' >&2
                rm -rf build
                sleep 15
                run_build
              fi
              rm -f "$build_log"

              test "$(cat build/test-status)" -eq 0
            finally-script: |
              # Conan upload is performed inside Dockerfile.build so it also
              # runs when the test command itself fails.
              true
          - name: Mac
            runs-on: '["ephemeral","ephemeral-mac","${{ needs.resolve-images.outputs.macos }}","ephemeral-limit-memory-6144","ephemeral-limit-cpu-4"]'
            container-image: ''
            shell: bash
            artifact-name: test-results-macos
            test-command: |
              set -e
              set -x

              rm -rf venv
              python3 -m venv venv
              source ./venv/bin/activate

              python3 -m pip install conan
              conan remote add --index 0 art ${{ vars.CONAN_REPO_URL }} || true

              ARCH=$(uname -m)
              mkdir -p build
              cd build
              cmake -DCMAKE_BUILD_TYPE=Debug -GNinja \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DCMAKE_CXX_FLAGS="-stdlib=libc++" \
                -DCMAKE_OSX_ARCHITECTURES="$ARCH" \
                ..
              ninja tests
              ctest --output-junit junit.xml -D ExperimentalTest --no-compress-output
            finally-script: |
              set -e
              set -x

              source ./venv/bin/activate
              conan remote login art "$ARTIFACTORY_USER" --password "$ARTIFACTORY_API_KEY"
              conan upload -r art -c "*" 2>&1 | grep --line-buffered "Uploading"
    uses: AdGuardSoftwareLimited/actions/.github/workflows/junit-tests.yml@master
    secrets:
      test-env: |
        ARTIFACTORY_USER=${{ secrets.ARTIFACTORY_USER }}
        ARTIFACTORY_API_KEY=${{ secrets.ARTIFACTORY_API_KEY }}
    with:
      runs-on: ${{ matrix.runs-on }}
      container-image: ${{ matrix.container-image }}
      shell: ${{ matrix.shell || 'bash' }}
      test-command: ${{ matrix.test-command }}
      finally-script: ${{ matrix.finally-script }}
      results-path: 'build/junit.xml'
      artifact-name: ${{ matrix.artifact-name }}

  android-build:
    name: Android build
    if: always() && github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    needs: tests
    runs-on: team-corelibs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Android library
        env:
          CONAN_REPO_URL: ${{ vars.CONAN_REPO_URL }}
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_API_KEY: ${{ secrets.ARTIFACTORY_API_KEY }}
        run: |
          set -euxo pipefail

          build_log=$(mktemp)
          run_build() {
            DOCKER_BUILDKIT=1 docker build --progress=plain \
              --build-arg CI_CACHE_BUSTER='${{ github.run_id }}-${{ github.run_attempt }}' \
              --secret id=conan_repo_url,env=CONAN_REPO_URL \
              --secret id=artifactory_user,env=ARTIFACTORY_USER \
              --secret id=artifactory_api_key,env=ARTIFACTORY_API_KEY \
              --target android-build \
              --output type=cacheonly \
              -f Dockerfile.build . 2>&1 | tee "$build_log"
          }

          if ! run_build; then
            if ! grep -Eq 'graceful_stop|failed to receive status' "$build_log"; then
              exit 1
            fi
            echo 'BuildKit stopped gracefully; retrying the build once.' >&2
            sleep 15
            run_build
          fi
          rm -f "$build_log"
