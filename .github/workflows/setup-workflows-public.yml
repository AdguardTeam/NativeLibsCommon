name: Setup workflows for public repository

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'

jobs:
  disable-private-workflows:
    name: Disable workflows with private uses
    if: github.repository == 'AdguardTeam/NativeLibsCommon'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Disable workflows with private uses
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e

          for workflow in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$workflow" ] || continue
            workflow_name=$(basename "$workflow")

            # Match uses: as a YAML key (at line start with indentation)
            if grep -Eq '^\s+uses:.*AdGuardSoftwareLimited' "$workflow"; then
              echo "Found private uses in: $workflow_name"

              # Check if workflow is already disabled
              state=$(gh workflow view "$workflow_name" --json state -q '.state' 2>/dev/null || echo "unknown")
              if [ "$state" = "disabled_manually" ]; then
                echo "  Already disabled, skipping"
              else
                echo "  Disabling workflow"
                gh workflow disable "$workflow_name"
              fi
            fi
          done
