name: Check CHANGELOG and auto-tag

on:
  push:
    branches:
      - master
      - 'stable-*'

permissions:
  contents: write

jobs:
  autotag:
    name: Check CHANGELOG and auto-tag
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    runs-on: [team-corelibs]
    outputs:
      tagged: ${{ steps.detect.outputs.should_tag }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect new version in CHANGELOG
        id: detect
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            let diff = '';
            try {
              diff = execSync('git diff HEAD~1 HEAD -- CHANGELOG.md', { encoding: 'utf8' });
            } catch (_) {
              diff = '';
            }

            if (!diff.trim()) {
              console.log('No changes to CHANGELOG.md');
              core.setOutput('should_tag', 'false');
              return;
            }

            const newVersionMatch = diff.match(/^\+## \[(\d+\.\d+\.\d+)\]/m);
            if (!newVersionMatch) {
              console.log('No new version found in CHANGELOG.md diff');
              core.setOutput('should_tag', 'false');
              return;
            }

            const newVersion = newVersionMatch[1];
            console.log(`Found new version: ${newVersion}`);

            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            const lines = changelog.split(/\r?\n/);

            const latestLine = lines.find((line) => /^## \[\d+\.\d+\.\d+\]/.test(line));
            if (!latestLine) {
              core.setFailed('Could not find latest version in CHANGELOG.md');
              return;
            }

            const latestVersion = latestLine.match(/^## \[(\d+\.\d+\.\d+)\]/)[1];
            if (newVersion !== latestVersion) {
              console.log(`New version ${newVersion} is not the latest version in CHANGELOG.md (latest is ${latestVersion})`);
              core.setOutput('should_tag', 'false');
              return;
            }

            let tagExists = false;
            try {
              execSync(`git rev-parse v${newVersion}`, { stdio: 'ignore' });
              tagExists = true;
            } catch (_) {
              tagExists = false;
            }

            if (tagExists) {
              console.log(`Tag v${newVersion} already exists`);
              core.setOutput('should_tag', 'false');
              return;
            }

            const startIndex = lines.findIndex((line) => line.startsWith(`## [${newVersion}]`));
            if (startIndex === -1) {
              core.setFailed(`Could not find section for version ${newVersion} in CHANGELOG.md`);
              return;
            }

            let endIndex = lines.length;
            for (let i = startIndex + 1; i < lines.length; i += 1) {
              if (/^## \[/.test(lines[i])) {
                endIndex = i;
                break;
              }
            }

            const releaseNotes = lines.slice(startIndex, endIndex).join('\n').trimEnd();

            console.log(`Will create tag v${newVersion}`);
            core.setOutput('should_tag', 'true');
            core.setOutput('version', newVersion);
            core.setOutput('release_notes', releaseNotes);

      - name: Create and push tag
        if: steps.detect.outputs.should_tag == 'true'
        env:
          RELEASE_NOTES: ${{ steps.detect.outputs.release_notes }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@adguard.com"
          git tag -a "v${{ steps.detect.outputs.version }}" -m "$RELEASE_NOTES"
          git push origin "v${{ steps.detect.outputs.version }}"
          echo "Successfully created and pushed tag v${{ steps.detect.outputs.version }}"

  trigger-after-auto-tag:
    name: Trigger after auto-tag actions
    needs: autotag
    if: needs.autotag.outputs.tagged == 'true'
    runs-on: [team-corelibs]
    permissions:
      contents: write
    steps:
      - name: Trigger upload-conan-recipes workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'After auto-tag',
            })
