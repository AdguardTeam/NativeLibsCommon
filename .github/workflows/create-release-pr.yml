name: Create release PR

on:
  workflow_dispatch:
    inputs:
      semver_part:
        description: 'Version part to increment'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: Prepare release
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    runs-on: [team-corelibs]
    outputs:
      new_version: ${{ steps.version.outputs.new }}
      branch: ${{ steps.branch.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate new version
        id: version
        run: |
          set -e

          # Get the latest version from CHANGELOG.md (first non-Unreleased version)
          CURRENT_VERSION=$(grep -E '^## \[[0-9]+\.[0-9]+\.[0-9]+\]' CHANGELOG.md | head -1 | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+)\].*/\1/')

          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not find current version in CHANGELOG.md"
            exit 1
          fi

          echo "Current version: $CURRENT_VERSION"

          # Parse version parts
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # Increment the appropriate part
          case "${{ inputs.semver_part }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION"

          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          python3 scripts/update_changelog.py "${{ steps.version.outputs.new }}" "$(date +%Y-%m-%d)"

      - name: Run set_version script
        run: |
          cd scripts
          chmod +x set_version.sh
          ./set_version.sh "${{ steps.version.outputs.new }}"

      - name: Create branch and commit
        id: branch
        run: |
          set -e

          NEW_VERSION="${{ steps.version.outputs.new }}"
          BRANCH_NAME="release/v${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@adguard.com"

          git checkout -b "$BRANCH_NAME"
          git add -A
          git commit -m "Release v${NEW_VERSION}"
          git push origin "$BRANCH_NAME"

          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

  create-pr:
    needs: prepare-release
    uses: AdGuardSoftwareLimited/actions/.github/workflows/create-pr.yml@feature/create-pr
    with:
      runs-on: '["team-corelibs"]'
      head: ${{ needs.prepare-release.outputs.branch }}
      base: master
      title: 'Release v${{ needs.prepare-release.outputs.new_version }}'
      body: |
        ## Release v${{ needs.prepare-release.outputs.new_version }}

        This PR was automatically created by the release workflow.

        ### Changes
        - Updated CHANGELOG.md
        - Bumped version to ${{ needs.prepare-release.outputs.new_version }}

        ### Checklist
        - [ ] Review CHANGELOG.md entries
        - [ ] Verify version bump is correct
