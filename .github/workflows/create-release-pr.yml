name: Create release PR

on:
  workflow_dispatch:
    inputs:
      part:
        description: 'Version part to increment'
        required: true
        default: 'default'
        type: choice
        options:
          - major
          - minor
          - default
      level:
        description: 'Release level'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - rc
          - release
  workflow_call:
    inputs:
      part:
        description: 'Version part to increment (major, minor, default)'
        required: false
        default: 'default'
        type: string
      level:
        description: 'Release level (default, rc, release)'
        required: false
        default: 'default'
        type: string

permissions:
  contents: read

jobs:
  # Missing piece not covered by the reusable workflow: derive the next version
  # from the requested part + level and the latest version in CHANGELOG.md.
  # The version math lives in the next-version composite action (see its
  # action.yml for the full transition table).
  increment:
    name: Calculate new version
    if: github.repository_owner == 'AdGuardSoftwareLimited'
    runs-on: [team-corelibs]
    outputs:
      new: ${{ steps.next.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read current version from CHANGELOG.md
        id: current
        run: |
          set -euo pipefail

          # Latest version from CHANGELOG.md (first non-Unreleased version,
          # including any -beta.N / -rc.N prerelease suffix).
          CURRENT_VERSION=$(grep -E '^## \[[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?\]' CHANGELOG.md | head -1 | sed -E 's/^## \[([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?)\].*/\1/')

          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not find current version in CHANGELOG.md"
            exit 1
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Calculate new version
        id: next
        uses: AdGuardSoftwareLimited/native-libs-common/.github/actions/next-version@master
        with:
          current_version: ${{ steps.current.outputs.version }}
          part: ${{ inputs.part }}
          level: ${{ inputs.level }}

  # Everything else (changelog patch, branch, commit, PR via Octopass) is handled
  # by the shared reusable workflow.
  create-pr:
    needs: increment
    uses: AdGuardSoftwareLimited/actions/.github/workflows/create-release-pr.yml@feature/libs_release_flow
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    with:
      version: ${{ needs.increment.outputs.new }}
      team: corelibs
