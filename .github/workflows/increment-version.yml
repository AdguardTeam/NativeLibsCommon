name: Increment version

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
  workflow_dispatch:
    inputs:
      custom_version:
        description: 'Custom version (leave empty for auto-increment)'
        required: false
        default: ''

permissions:
  contents: write
  id-token: write

jobs:
  increment-version:
    name: Increment version
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    runs-on: [team-corelibs]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Increment version
        run: |
          cd scripts
          ./increment_version.sh ${{ inputs.custom_version }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@adguard.com"
          git add conandata.yml
          git commit -m "[skip ci] Automatic version increment" || echo "No changes to commit"
          git push

  trigger-after-increment-version:
    name: Trigger after version increment actions
    needs: increment-version
    runs-on: [team-corelibs]
    permissions:
      contents: write
    steps:
      - name: Trigger upload-conan-recipes workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'After increment version',
            })
