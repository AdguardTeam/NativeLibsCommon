name: Mirror to public repository

on:
  push:
    branches:
      - master
      - 'stable-*'
      - 'dev-*'
    tags:
      - '*'
  workflow_dispatch:
  repository_dispatch:
    types:
      - After auto-tag

jobs:
  mirror:
    name: Mirror to public repository
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    uses: AdGuardSoftwareLimited/actions/.github/workflows/mirror.yml@master
    with:
      team: corelibs
      target_repo: 'git@github.com:AdguardTeam/NativeLibsCommon.git'
      disable_workflows_target: all -release-conanfiles.yml
      disable_workflows_source: release-conanfiles.yml
    secrets: inherit
    permissions:
      actions: write
      contents: read
      id-token: write
