name: Mirror to public repository

on:
  push:
    branches:
      - master
      - 'stable-*'
    tags:
      - '*'
  workflow_dispatch:
  repository_dispatch:
    types:
      - After increment version

jobs:
  mirror:
    name: Mirror to public repository
    if: github.repository == 'AdGuardSoftwareLimited/native-libs-common'
    uses: AdGuardSoftwareLimited/actions/.github/workflows/mirror.yaml@master
    with:
      target_repo: 'git@github.com:AdguardTeam/NativeLibsCommon.git'
    secrets: inherit
    permissions:
      contents: read
      id-token: write
